server:
  port: 8081
  servlet:
    context-path: /api/v1/users

spring:
  application:
    name: ms-users
  datasource:
    url: jdbc:postgresql://localhost:5432/usuarios_db
    username: usuario_db
    password: usuario_db
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: user_management

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: user_management
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    schemas: user_management
    placeholders:
      schema_name: user_management

jwt:
  secret: 9d094b8e4ae83d8c451db5c0a280cbb094b730813235295285a5d951808abc00
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

logging:
  level:
    com.pragma.usuarios: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method