server:
  port: 8081

spring:
  application:
    name: ms-usuarios
  datasource:
    url: jdbc:postgresql://localhost:5432/usuarios_db
    username: usuario_db
    password: usuario_db
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: usuarios

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true